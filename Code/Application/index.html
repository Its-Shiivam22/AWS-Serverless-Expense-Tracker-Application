<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseTrack</title>

<style>
* { box-sizing: border-box; }

:root {
  --aws-navy: #0f172a;
  --aws-dark: #020617;
  --aws-card: #111827;
  --aws-card-light: #1e293b;
  --aws-orange: #ff9900;
  --aws-orange-dark: #ec7211;
  --text-light: #f8fafc;
  --text-muted: #cbd5e1;
  --danger: #ef4444;
  --success: #22c55e;
}

body {
  margin: 0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  background:
    radial-gradient(circle at top left, rgba(255,153,0,0.18), transparent 30%),
    radial-gradient(circle at bottom right, rgba(56,189,248,0.14), transparent 30%),
    linear-gradient(135deg, var(--aws-dark), var(--aws-navy));
  color: var(--text-light);
  min-height: 100vh;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 24px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 22px;
}

.logo {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--aws-orange), var(--aws-orange-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #111827;
  font-size: 26px;
  font-weight: 900;
}

.brand h1 {
  margin: 0;
  font-size: 28px;
}

.brand span { color: var(--aws-orange); }

.brand p {
  margin: 2px 0 0;
  color: var(--text-muted);
  font-size: 14px;
}

.card {
  background: rgba(17,24,39,0.9);
  border: 1px solid rgba(148,163,184,0.18);
  backdrop-filter: blur(14px);
  padding: 22px;
  border-radius: 18px;
  margin-top: 20px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}

.grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 20px;
}

input, select {
  width: 100%;
  padding: 13px 14px;
  margin-top: 12px;
  border-radius: 10px;
  border: 1px solid rgba(148,163,184,0.25);
  background: #0f172a;
  color: white;
  outline: none;
}

input:focus, select:focus {
  border-color: var(--aws-orange);
}

button {
  width: 100%;
  padding: 13px 16px;
  margin-top: 12px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--aws-orange), var(--aws-orange-dark));
  color: #111827;
  font-weight: 800;
  cursor: pointer;
}

.logout {
  background: linear-gradient(135deg, #ef4444, #b91c1c);
  color: white;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header button {
  width: auto;
  min-width: 120px;
}

.expense {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 10px;
  align-items: center;
  margin-top: 12px;
  padding: 14px;
  background: rgba(30,41,59,0.86);
  border-radius: 12px;
}

.category-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 14px;
}

.category-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 999px;
  background: rgba(255,153,0,0.12);
  color: var(--text-light);
  font-size: 13px;
  border: 1px solid rgba(255,153,0,0.25);
}

.category-chip.default {
  color: var(--aws-orange);
}

.chip-delete {
  width: auto;
  padding: 3px 7px;
  margin: 0;
  border-radius: 999px;
  background: var(--danger);
  color: white;
  font-size: 11px;
}

.small-btn {
  width: auto;
  padding: 8px 12px;
  margin-top: 0;
  font-size: 13px;
}

.amount-pill {
  background: rgba(255,153,0,0.14);
  color: var(--aws-orange);
  padding: 6px 10px;
  border-radius: 999px;
  font-weight: 800;
}

small { color: var(--text-muted); }

.error {
  color: #fecaca;
  margin-top: 10px;
}

.success {
  color: #bbf7d0;
  margin-top: 10px;
}

.hero {
  text-align: center;
  max-width: 520px;
  margin: 90px auto 0;
}

.badge {
  display: inline-block;
  background: rgba(255,153,0,0.12);
  color: var(--aws-orange);
  padding: 7px 12px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 14px;
}

@media(max-width: 760px) {
  .grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; align-items: stretch; gap: 10px; }
  .header button { width: 100%; }
  .expense { grid-template-columns: 1fr; }
  .small-btn { width: 100%; }
}
</style>
</head>

<body>

<div class="container">

  <div class="brand">
    <div class="logo">₹</div>
    <div>
      <h1>Expense<span>Track</span></h1>
      <p>Serverless expense management powered by AWS</p>
    </div>
  </div>

  <div id="loginCard" class="card hero" style="display:none;">
    <div class="badge">AWS Cognito Secure Login</div>
    <h2>Track smarter. Spend better.</h2>
    <p>Manage your daily expenses securely using AWS Cognito, API Gateway, Lambda, and DynamoDB.</p>
    <button onclick="login()">Login with AWS Cognito</button>
  </div>

  <div id="app" style="display:none;">

    <div class="card header">
      <div>
        <h2 id="welcomeText">Welcome</h2>
        <small>Your personal cloud expense dashboard</small>
      </div>
      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="grid">
      <div class="card">
        <h3>Add Expense</h3>
        <input id="title" placeholder="Expense title">
        <input id="amount" type="number" placeholder="Amount">
        <input id="expenseDate" type="date">
        <select id="category"></select>
        <button onclick="addExpense()">Add Expense</button>
        <div id="expenseMessage"></div>
      </div>

      <div class="card">
        <h3>Categories</h3>
        <input id="newCategory" placeholder="New custom category">
        <button onclick="addCategory()">Add Category</button>
        <div id="categoryMessage"></div>
        <div id="categoryList" class="category-list"></div>
      </div>
    </div>

    <div class="card">
      <h3>Your Expenses</h3>
      <div id="expenseList"></div>
    </div>

  </div>

</div>

<script>
const COGNITO_DOMAIN = "https://ap-south-1m884jrymm.auth.ap-south-1.amazoncognito.com";
const CLIENT_ID = "7jcd1avf7267hldnejh5g18pkc";
const REDIRECT_URI = "https://dd9qkvzvpihvd.cloudfront.net";
const LOGOUT_URI = "https://dd9qkvzvpihvd.cloudfront.net";
const API_BASE_URL = "https://mahbq4aw0i.execute-api.ap-south-1.amazonaws.com";

const defaultCategories = [
  "Food & Dining",
  "Health & Medicine",
  "Entertainment",
  "Shopping",
  "Travel",
  "Bills & Utilities",
  "Education",
  "Investments",
  "Personal Care",
  "Others"
];

function login() {
  window.location.href =
    `${COGNITO_DOMAIN}/login?client_id=${CLIENT_ID}&response_type=token&scope=openid+email+profile&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
}

function logout() {
  localStorage.clear();
  window.location.href =
    `${COGNITO_DOMAIN}/logout?client_id=${CLIENT_ID}&logout_uri=${encodeURIComponent(LOGOUT_URI)}`;
}

function parseTokens() {
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const idToken = params.get("id_token");
  const accessToken = params.get("access_token");

  if (idToken) localStorage.setItem("id_token", idToken);
  if (accessToken) localStorage.setItem("access_token", accessToken);

  if (idToken || accessToken) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }
}

function parseJwt(token) {
  try {
    const base64 = token.split(".")[1].replace(/-/g, "+").replace(/_/g, "/");
    const padded = base64.padEnd(base64.length + (4 - base64.length % 4) % 4, "=");
    return JSON.parse(atob(padded));
  } catch {
    return {};
  }
}

function authHeaders() {
  return { "Authorization": `Bearer ${localStorage.getItem("id_token")}` };
}

function jsonAuthHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${localStorage.getItem("id_token")}`
  };
}

function showMessage(id, message, type = "error") {
  const el = document.getElementById(id);
  el.className = type;
  el.innerText = message;
}

function clearMessage(id) {
  const el = document.getElementById(id);
  el.className = "";
  el.innerText = "";
}

function init() {
  parseTokens();
  const token = localStorage.getItem("id_token");

  if (!token) {
    document.getElementById("loginCard").style.display = "block";
    document.getElementById("app").style.display = "none";
    return;
  }

  document.getElementById("loginCard").style.display = "none";
  document.getElementById("app").style.display = "block";

  const user = parseJwt(token);
  document.getElementById("welcomeText").innerText =
    "👋 Welcome, " + (user.name || user.email || user["cognito:username"] || "User");

  loadCategories();
  fetchExpenses();
}

async function loadCategories() {
  let backend = [];

  try {
    const res = await fetch(`${API_BASE_URL}/categories`, {
      method: "GET",
      headers: authHeaders()
    });
    if (res.ok) backend = await res.json();
  } catch (err) {
    console.error("Category load failed:", err);
  }

  const map = new Map();

  defaultCategories.forEach(cat => {
    map.set(cat, { name: cat, isDefault: true });
  });

  backend.forEach(cat => {
    if (cat && cat.name) map.set(cat.name, cat);
  });

  const select = document.getElementById("category");
  const list = document.getElementById("categoryList");

  select.innerHTML = "";
  list.innerHTML = "";

  map.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat.name;
    option.textContent = cat.name;
    select.appendChild(option);

    const chip = document.createElement("div");
    chip.className = cat.isDefault ? "category-chip default" : "category-chip";

    const nameSpan = document.createElement("span");
    nameSpan.textContent = cat.name;
    chip.appendChild(nameSpan);

    if (!cat.isDefault) {
      const btn = document.createElement("button");
      btn.className = "chip-delete";
      btn.textContent = "×";
      btn.onclick = () => deleteCategory(cat.name);
      chip.appendChild(btn);
    }

    list.appendChild(chip);
  });
}

async function addCategory() {
  clearMessage("categoryMessage");

  const name = document.getElementById("newCategory").value.trim();

  if (!name) {
    showMessage("categoryMessage", "Please enter category name.");
    return;
  }

  try {
    const res = await fetch(`${API_BASE_URL}/categories`, {
      method: "POST",
      headers: jsonAuthHeaders(),
      body: JSON.stringify({ name })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage("categoryMessage", data.error || "Failed to add category.");
      return;
    }

    document.getElementById("newCategory").value = "";
    showMessage("categoryMessage", "Category added successfully.", "success");
    loadCategories();

  } catch (err) {
    console.error("Add category failed:", err);
    showMessage("categoryMessage", "Network/CORS error while adding category.");
  }
}

async function deleteCategory(name) {
  clearMessage("categoryMessage");

  try {
    const res = await fetch(`${API_BASE_URL}/categories/${encodeURIComponent(name)}`, {
      method: "DELETE",
      headers: authHeaders()
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage("categoryMessage", data.error || "Failed to delete category.");
      return;
    }

    showMessage("categoryMessage", "Category deleted successfully.", "success");
    loadCategories();

  } catch (err) {
    console.error("Delete category failed:", err);
    showMessage("categoryMessage", "Network/CORS error while deleting category.");
  }
}

async function fetchExpenses() {
  const list = document.getElementById("expenseList");
  list.innerHTML = "<small>Loading expenses...</small>";

  try {
    const res = await fetch(`${API_BASE_URL}/expenses`, {
      method: "GET",
      headers: authHeaders()
    });

    const data = await res.json().catch(() => []);

    if (!res.ok) {
      list.innerHTML = "<small>Failed to load expenses.</small>";
      return;
    }

    list.innerHTML = "";

    if (!Array.isArray(data) || data.length === 0) {
      list.innerHTML = "<small>No expenses added yet.</small>";
      return;
    }

    data.forEach(expense => {
      const row = document.createElement("div");
      row.className = "expense";

      const titleSpan = document.createElement("span");
      titleSpan.textContent = `${expense.title} (${expense.category}) - ${expense.date || "No date"}`;

      const amountSpan = document.createElement("span");
      amountSpan.className = "amount-pill";
      amountSpan.textContent = `₹${expense.amount}`;

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "small-btn logout";
      deleteBtn.textContent = "Delete";
      deleteBtn.onclick = () => deleteExpense(expense.expenseId);

      row.appendChild(titleSpan);
      row.appendChild(amountSpan);
      row.appendChild(deleteBtn);

      list.appendChild(row);
    });

  } catch (err) {
    console.error("Fetch expenses failed:", err);
    list.innerHTML = "<small>Network/CORS error while loading expenses.</small>";
  }
}

async function addExpense() {
  clearMessage("expenseMessage");

  const title = document.getElementById("title").value.trim();
  const amount = document.getElementById("amount").value;
  const expenseDate = document.getElementById("expenseDate").value;
  const category = document.getElementById("category").value;

  if (!title || !amount || !expenseDate || !category) {
    showMessage("expenseMessage", "Please fill title, amount, date and category.");
    return;
  }

  try {
    const res = await fetch(`${API_BASE_URL}/expenses`, {
      method: "POST",
      headers: jsonAuthHeaders(),
      body: JSON.stringify({
        title,
        amount: Number(amount),
        date: expenseDate,
        category
      })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage("expenseMessage", data.error || "Failed to add expense.");
      return;
    }

    document.getElementById("title").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("expenseDate").value = "";

    showMessage("expenseMessage", "Expense added successfully.", "success");
    fetchExpenses();

  } catch (err) {
    console.error("Add expense failed:", err);
    showMessage("expenseMessage", "Network/CORS error while adding expense.");
  }
}

async function deleteExpense(id) {
  clearMessage("expenseMessage");

  try {
    const res = await fetch(`${API_BASE_URL}/expenses/${encodeURIComponent(id)}`, {
      method: "DELETE",
      headers: authHeaders()
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showMessage("expenseMessage", data.error || "Failed to delete expense.");
      return;
    }

    showMessage("expenseMessage", "Expense deleted successfully.", "success");
    fetchExpenses();

  } catch (err) {
    console.error("Delete expense failed:", err);
    showMessage("expenseMessage", "Network/CORS error while deleting expense.");
  }
}

init();
</script>

</body>
</html>
